# Kaynak (mem_limit/cpus) ve log rotation limitleri onceden yalniz VM130'da
# git-disi bir docker-compose.prod.yml overlay'inde tanimliydi (versiyon
# kontrolde degildi, tekrarlanamaz/gozden gecirilemezdi). 8 Tem'de redis bu
# overlay VERILMEDEN recreate edildi ve 320m cgroup tavanini kaybederek
# sinirsiz calisir hale geldi -- overlay'e bagimliligin somut basarisizlik
# modu. Tum limitler + log rotation buraya (tek kaynak) tasindi; overlay
# silindi. `docker compose up` (ikinci -f gerekmez) artik dogru sonucu verir.
#
# Stil karari: `deploy.resources.limits` yerine ust-seviye `mem_limit`/`cpus`
# kullanildi -- (1) dosyadaki tek onceki ornek olan cadvisor zaten bu stili
# kullaniyordu, iki farkli mekanizma karistirmak okunabilirligi dusurur; (2)
# `deploy.*` bicimsel olarak Swarm deploy config'idir, Compose V2'nin plain
# `up` altinda da uyguladigi dogru ama surume/versiyona bagli, daha az bilinen
# bir davranistir -- bu servis hicbir zaman Swarm modunda calismiyor, ust-
# seviye alanlar niyeti hem docker compose hem eski docker-compose (v1) icin
# ayni netlikte ifade eder.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # volatile-ttl: bellek baskisinda yalnizca TTL'li cache anahtarlari (histcache,
    # negative) silinir; TTL'siz kanonik veri (fiyat hash'i, intraday) asla evict
    # edilmez. appendonly: crash'te 60 sn'lik RDB penceresi kaybolmasin.
    # requirepass + protected-mode (AH-03): redis'e yalnizca ayni compose agindaki
    # servisler erisir; parola sh -c ile env'den genisletilir (argv'de literal
    # gorunmesin diye $$REDIS_PASSWORD -- compose'un kendisi $ isaretini
    # yorumlamasin diye kacisli). REDISCLI_AUTH env'i healthcheck'in parolayi
    # CMD argv'sinde (ps/log'da gorunur sekilde) tasimasini onler (colendi-gateway
    # kaligi referans).
    command: >
      sh -c 'exec redis-server
      --requirepass "$$REDIS_PASSWORD"
      --protected-mode yes
      --save 60 1
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy volatile-ttl'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    # Uygulama-seviyesi --maxmemory 256mb yukarida Redis'in kendi cap'i --
    # client buffer/AOF/overhead bunun disinda kalir, bu yuzden cgroup tavani
    # (320m) ayrica gerekli (canli olcum: RSS ~18MB, tavan cok daha yuksek --
    # buyume payi).
    mem_limit: 320m
    # Log rotation tum servislerde ayni (json-file, rotate edilmezse VM130'un
    # kok diskini doldurabilir): en fazla 3 x 10MB = 30MB/servis.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  updater:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.updater_main"]
    env_file:
      - path: .env
        required: false
    environment:
      # Base .env'deki REDIS_URL'i redis servisinin agina isaret edecek sekilde
      # ezer (compose her zaman kendi agini kullanir). HIGH-1 (PR#19 review):
      # parola artik URL'e GOMULMEZ -- REDIS_PASSWORD ayri env olarak gecirilir,
      # app/config.py `_build_redis_url` bunu TEK NOKTADA percent-encode ederek
      # birlestirir (`/`, `+`, `=` iceren parolalar -- openssl rand -base64 32
      # ~%50 uretir -- eskiden urlparse/redis.from_url'u ValueError'a dusurup
      # api/updater/bot'u crash-loop'a sokuyordu).
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}
    # Updater HTTP servisi degildir; HTTP healthcheck'i devre disi birak.
    healthcheck:
      disable: true
    # Prometheus (VM140) icin updater metrik portu -- host'a publish edilir.
    # Sadece 'expose' iken compose-agi DISINDAN (VM140) scrape edilemiyordu (H1).
    # MEDIUM-4: 0.0.0.0 yerine VM130'un ic arayuzune (10.10.10.130) baglanir --
    # Docker publish, host firewall INPUT kurallarini ATLAYABILIR (iptables
    # DOCKER-USER zincirinden once NAT'lanir); tum arayuzlere acmak bunu
    # firewall-disi bir yuzey yapar.
    ports:
      - "10.10.10.130:8001:8001"
    # Webhook kullanmak icin: webhooks.json olusturun ve asagidaki satiri acin.
    # volumes:
    #   - ./webhooks.json:/app/webhooks.json:ro
    depends_on:
      redis:
        condition: service_healthy
    # Canli olcum (VM130): ~163MB / 1024MB (%16) -- provider fetch/aggregator
    # calisirken gecici spike'lara genis pay birakildi (1.5 CPU: batch dongusu
    # es zamanli fetch icin thread-pool kullanir, tek core'a sikismasin).
    cpus: 1.5
    mem_limit: 1024m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      # HIGH-1 (PR#19 review): bkz. updater servisindeki ayni satirin ustundeki
      # aciklama -- parola URL'e gomulmez, ayri env + app/config.py tek-nokta
      # percent-encode.
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}
    # M1 (infra-verify): 0.0.0.0 yerine host-bind adresi API_HOST env'inden
    # okunur -- VM130'un ic arayuzune (10.10.10.130) baglanmasi icin canli
    # .env'de API_HOST=10.10.10.130 TANIMLI OLMALI (VM120 tuketimi + VM140
    # /metrics scrape bu adrese gider, updater/cadvisor'daki ayni desenin
    # emsali). Tanimsizsa fail-safe varsayilan 127.0.0.1 -- 0.0.0.0'a asla
    # dusmez (unutulmus env acik-yuzey degil erisilemezlik uretir), ayrica
    # README'deki `docker compose up -d --build` + localhost:8000 hizli-
    # baslangic akisini yerel gelistirmede bozmaz (colendi-gateway API_HOST
    # emsali, bkz. services/colendi-gateway/docker-compose.yml).
    ports:
      - "${API_HOST:-127.0.0.1}:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    # Canli olcum (VM130): ~138MB / 512MB (%27) -- stateless, N kopyaya
    # olceklenebilir oldugundan tek instance icin dar tutuldu.
    cpus: 1.0
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Telegram bot (REST API istemcisi). TELEGRAM_ENABLED=false varsayilan oldugundan
  # token verilmezse temiz cikar (exit 0).
  # restart: unless-stopped -- VM130'daki kayip overlay'den konsolide edildi;
  # VM130'da TELEGRAM_ENABLED=true (canli teshis: bot RestartCount=0, restart-
  # loop YOK), bu yuzden VM130 icin davranis DEGISMEDI. AMA base dosya artik
  # tek kaynak: TELEGRAM_ENABLED=false olan her ortamda (dev, CI, taze klon)
  # bot exit(0) yapar ve `unless-stopped` bunu Docker'in backoff'lu restart-
  # loop'uyla yeniden baslatir -- eski `on-failure` (exit 0'da durur, yalniz
  # crash'te yeniden baslar) bu riski tasimiyordu. Kalici cozum uygulama
  # katmaninda (devre disiyken exit yerine idle kalmak) -- ayri bir is olarak
  # acilmali; compose-seviyesinde `profiles: [telegram]` KULLANILMADI, cunku
  # bu, `docker compose up -d`'nin bot'u SESSIZCE atlamasina yol acar (`--profile
  # telegram` unutulursa servis prod'dan kaybolur) -- tam bu PR'in yok ettigi
  # hata sinifi.
  bot:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.telegram_bot"]
    env_file:
      - path: .env
        required: false
    environment:
      # HIGH-1 (PR#19 review): bkz. updater servisindeki ayni satirin ustundeki
      # aciklama -- parola URL'e gomulmez, ayri env + app/config.py tek-nokta
      # percent-encode.
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}
      - TELEGRAM_API_URL=http://api:8000
    healthcheck:
      disable: true
    depends_on:
      - api
      - redis
    # Hafif REST istemcisi -- gozlemlenen crash/kaynak baskisi yok, dar tavan.
    cpus: 0.5
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Armert x Bisteyes veri kontrol paneli. nginx dashboard'u sunar VE /api'yi
  # api:8000'e reverse-proxy'ler (X-API-Key sunucu-tarafinda eklenir; ayni-origin).
  panel:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      # Uretimde .env'den gelir; lokalde (auth kapali) bos olabilir.
      - DASH_API_KEY=${DASH_API_KEY:-}
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./deploy/panel/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    # 8080:80 base'in orijinal mapping'i (cadvisor cakismasini onlemek icin
    # secilmisti, bkz. cadvisor notu). 80:80 kayip overlay'den geliyordu --
    # ikisi de VM130'da fiilen aktifti (compose liste-tipi alanlari birden
    # fazla -f arasinda BIRLESTIRIR, degistirmez); ikisi de korunuyor.
    # M1 (infra-verify): api servisindeki ayni satirin ustundeki aciklama --
    # 0.0.0.0 yerine PANEL_HOST env'i (VM130'da 10.10.10.130, cloudflared/
    # VM110 tunnel'in bist-canli-veri.bisteyes.com'u bu adrese yonlendirmesi
    # icin sart) kullanilir; tanimsizsa fail-safe 127.0.0.1.
    ports:
      - "${PANEL_HOST:-127.0.0.1}:8080:80"
      - "${PANEL_HOST:-127.0.0.1}:80:80"
    depends_on:
      - api
    # nginx statik + reverse-proxy -- hafif, dar tavan.
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # cAdvisor: VM140 Prometheus'un container-bazi bellek/CPU/OOM metriklerini
  # scrape edebilmesi icin. NOT: host port 8080 zaten yukaridaki 'panel'
  # servisi tarafindan kullaniliyor (8080:80); canli public dashboard'u (nginx
  # panel) riske atmamak icin cAdvisor host'ta 8081'e baglanir (container ici
  # sabit :8080, degistirilemez). Prometheus scrape hedefi buna gore
  # 10.10.10.130:8081 olmali (bkz. commit mesaji / PM'e giden rapor).
  cadvisor:
    # v0.49.1 Docker'in containerd-snapshotter modunu desteklemiyor ("failed to
    # identify the read-write layer ID", dockerVersion="" -> container'lar
    # gorunmuyor). Fix upstream'de v0.54+ (google/cadvisor PR #3709). gcr.io'da
    # v0.54.0 tag'i yok; en yakin >=v0.54 olan v0.54.1 kullanildi.
    image: gcr.io/cadvisor/cadvisor:v0.54.1
    restart: unless-stopped
    # AH-06: privileged:true kaldirildi -- container CPU/bellek metrikleri
    # (docker.sock + rootfs + sys salt-okunur mount'lariyla) privileged
    # OLMADAN da calisir; v0.54.1 + containerd-snapshotter ile canli
    # dogrulanan 6/6 container metrigi bu fix'ten etkilenmez (privileged tum
    # host cihazlarina erisim acar, gercekte kullanilmayan asiri-genis
    # yetkidir). /dev/kmsg acikca verildi: cAdvisor'in kernel OOM-event
    # tespiti (oom_events) bu cihazi okur; onceden privileged:true ile
    # dolayli erisiyordu, simdi acikca deklare edildi.
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/kmsg:/dev/kmsg
    ports:
      # MEDIUM-2 (review): "8081:8080" 0.0.0.0'a baglanir -- 8001 icin daha
      # once duzeltilen ayni public-expose acigi (ustelik privileged:true +
      # /:/rootfs:ro + auth'suz). Yalniz VM130'un kendi internal IP'sine baglan.
      - "10.10.10.130:8081:8080"
    volumes:
      - /:/rootfs:ro
      # docker.sock burada (/var/run/docker.sock) salt-okunur (:ro) mount'lu --
      # cadvisor'in container listesi/istatistikleri icin ihtiyac duydugu tek
      # docker.sock erisimi; yazma yetkisi yok (AH-06 doğrulama maddesi).
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    # v0.54.1'in gercek RSS'i VM130'da ~125MB (128m'e yapisik) -- kernel cgroup
    # OOM'u ~8 saatte bir sessizce oldurup restart ediyordu (Docker OOMKilled
    # bunu yanlis-negatif gosteriyor, cunku kernel cgroup kill'i gormuyor).
    # 256m, izlenen 6 container sabit kaldigi surece 2x headroom verir.
    mem_limit: 256m
    # cadvisor, restart-loop gecmisi olan (~8 saatte bir OOM) TEK container --
    # rotation'siz kalirsa her restart log biriktirir, kok diski sessizce
    # dolabilir. Diger 5 servisle ayni tavan.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
